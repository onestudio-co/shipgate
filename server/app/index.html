<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio Shipgate</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      color: #1a1a2e;
      background: #f7f7fb;
    }

    /* ── Shell: flex column filling full viewport ── */
    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #shell-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      z-index: 10;
    }
    #shell-header .brand {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -.01em;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #shell-header .brand svg {
      width: 20px; height: 20px;
    }
    #shell-header .context {
      font-size: .8125rem;
      color: #6b7280;
      font-weight: 400;
    }

    /* ── Scrollable card body ── */
    #app {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 32px 24px 24px;
    }

    /* ── Footer ── */
    #shell-footer {
      flex: 0 0 auto;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      padding: 0 24px;
      z-index: 10;
    }
    #shell-footer .progress-bar-wrap {
      height: 3px;
      background: #e5e7eb;
      margin-bottom: 0;
    }
    #shell-footer .progress-bar-fill {
      height: 3px;
      background: #4f46e5;
      transition: width .25s ease;
    }
    #shell-footer .footer-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
    }
    #shell-footer .progress-label {
      font-size: .8125rem;
      color: #6b7280;
      min-width: 110px;
    }
    #shell-footer .spacer { flex: 1; }
    #shell-footer button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1.5px solid transparent;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
    }
    #shell-footer .btn-back {
      background: transparent;
      border-color: #d1d5db;
      color: #374151;
    }
    #shell-footer .btn-back:hover:not(:disabled) { background: #f3f4f6; }
    #shell-footer .btn-back:disabled {
      opacity: .4; cursor: not-allowed;
    }
    #shell-footer .btn-approve {
      background: #dcfce7;
      border-color: #86efac;
      color: #15803d;
    }
    #shell-footer .btn-approve:hover { background: #bbf7d0; }
    #shell-footer .btn-change {
      background: #fef3c7;
      border-color: #fcd34d;
      color: #92400e;
    }
    #shell-footer .btn-change:hover { background: #fde68a; }
    #shell-footer .btn-change.active {
      background: #fde68a;
      border-color: #f59e0b;
    }
    #shell-footer .btn-question {
      background: #ede9fe;
      border-color: #c4b5fd;
      color: #5b21b6;
    }
    #shell-footer .btn-question:hover { background: #ddd6fe; }
    #shell-footer .btn-question.active {
      background: #ddd6fe;
      border-color: #7c3aed;
    }

    /* ── Note area in footer ── */
    #note-area {
      display: none;
      padding: 0 0 12px;
    }
    #note-area.visible { display: block; }
    #note-area textarea {
      width: 100%;
      min-height: 64px;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: .875rem;
      resize: vertical;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    #note-area textarea:focus { border-color: #4f46e5; }
    #note-area .note-submit {
      margin-top: 8px;
      padding: 8px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    #note-area .note-submit:hover { background: #4338ca; }
    #note-area .note-submit:disabled { opacity: .4; cursor: not-allowed; }
    #note-area .note-label {
      font-size: .8125rem;
      color: #6b7280;
      margin-bottom: 6px;
    }

    /* ── Card styles ── */
    .card {
      max-width: 760px;
      margin: 0 auto;
    }
    .card-risk-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .risk-chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .risk-NEEDS-YOU  { background: #fee2e2; color: #991b1b; }
    .risk-DELETION   { background: #fef3c7; color: #92400e; }
    .risk-BEHAVIOR   { background: #e0e7ff; color: #3730a3; }
    .risk-SAFE       { background: #d1fae5; color: #065f46; }

    .card-headline {
      font-size: 1.375rem;
      font-weight: 700;
      margin: 0 0 24px;
      line-height: 1.3;
      color: #111827;
      padding-left: 16px;
    }
    .card-section {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
    }
    .card-section.risk-accent-NEEDS-YOU { border-left: 4px solid #f87171; }
    .card-section.risk-accent-DELETION  { border-left: 4px solid #fbbf24; }
    .card-section.risk-accent-BEHAVIOR  { border-left: 4px solid #818cf8; }
    .card-section.risk-accent-SAFE      { border-left: 4px solid #34d399; }
    .section-label {
      font-size: .6875rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .section-body {
      font-size: .9375rem;
      line-height: 1.6;
      color: #374151;
      margin: 0;
    }

    /* ── Before/After block ── */
    .before-after {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }
    @media (max-width: 600px) {
      .before-after { grid-template-columns: 1fr; }
    }
    .ba-box {
      border-radius: 8px;
      padding: 14px 16px;
    }
    .ba-box.ba-before { background: #fef2f2; border: 1px solid #fecaca; }
    .ba-box.ba-after  { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .ba-label {
      font-size: .6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .ba-box.ba-before .ba-label { color: #991b1b; }
    .ba-box.ba-after  .ba-label { color: #065f46; }
    .ba-text {
      font-size: .9rem;
      line-height: 1.55;
      color: #374151;
      margin: 0;
    }

    /* ── Decision section (highlighted) ── */
    .decision-section {
      background: #eef2ff;
      border: 1.5px solid #a5b4fc;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .decision-section .section-label { color: #4338ca; }
    .decision-section .section-body { color: #1e1b4b; font-weight: 500; font-size: 1rem; }

    /* ── Outcome lines ── */
    .outcome-row {
      display: flex;
      gap: 10px;
      font-size: .875rem;
      line-height: 1.5;
      color: #374151;
      align-items: flex-start;
    }
    .outcome-row + .outcome-row { margin-top: 8px; }
    .outcome-icon { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }

    /* ── View diff button ── */
    .btn-diff {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: transparent;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: .8125rem;
      color: #374151;
      cursor: pointer;
      transition: background .12s, border-color .12s;
      margin-top: 16px;
    }
    .btn-diff:hover { background: #f3f4f6; border-color: #9ca3af; }

    /* ── Drawer overlay ── */
    #drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.38);
      z-index: 50;
      animation: fadeIn .18s ease;
    }
    #drawer-backdrop.open { display: block; }
    #drawer-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 56%;
      min-width: 320px;
      max-width: 800px;
      background: #fff;
      border-left: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      z-index: 51;
      transform: translateX(100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
    }
    #drawer-panel.open { transform: none; }
    #drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    #drawer-header h2 {
      font-size: .9375rem;
      font-weight: 600;
      margin: 0;
      color: #111827;
    }
    #drawer-close {
      background: transparent;
      border: none;
      font-size: 1.25rem;
      cursor: pointer;
      color: #6b7280;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: background .12s;
    }
    #drawer-close:hover { background: #f3f4f6; color: #111827; }
    #drawer-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 20px;
    }
    #drawer-body pre {
      margin: 0;
      font-family: "SF Mono", "Fira Mono", Menlo, Monaco, Consolas, monospace;
      font-size: .8125rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      color: #1a1a2e;
    }

    /* ── 503 error state ── */
    .error-state {
      max-width: 560px;
      margin: 40px auto;
      padding: 32px;
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #fecaca;
    }
    .error-state h2 { color: #991b1b; margin: 0 0 12px; font-size: 1.125rem; }
    .error-state p  { color: #374151; line-height: 1.6; margin: 0 0 12px; }
    .error-state pre {
      background: #fef2f2;
      border-radius: 6px;
      padding: 12px;
      font-size: .8125rem;
      color: #7f1d1d;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
    }

    /* ── Summary screen ── */
    .summary-wrap { max-width: 760px; margin: 0 auto; }
    .summary-wrap h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 24px;
      color: #111827;
    }
    .summary-row {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .summary-row .sr-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .summary-row .sr-headline {
      font-size: .9375rem;
      font-weight: 600;
      color: #111827;
      flex: 1;
    }
    .verdict-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .02em;
      cursor: pointer;
      transition: opacity .12s;
    }
    .verdict-badge:hover { opacity: .8; }
    .verdict-approve  { background: #dcfce7; color: #15803d; }
    .verdict-change   { background: #fef3c7; color: #92400e; }
    .verdict-question { background: #ede9fe; color: #5b21b6; }
    .sr-note {
      font-size: .875rem;
      color: #6b7280;
      font-style: italic;
    }
    .sr-edit {
      margin-top: 10px;
      display: none;
    }
    .sr-edit.visible { display: block; }
    .sr-edit select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1.5px solid #d1d5db;
      font-size: .875rem;
      color: #111827;
      background: #fff;
      margin-right: 8px;
    }
    .sr-edit textarea {
      width: 100%;
      min-height: 56px;
      margin-top: 8px;
      padding: 8px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: .875rem;
      resize: vertical;
      color: #111827;
      background: #fff;
    }
    .sr-edit .sr-save {
      margin-top: 8px;
      padding: 6px 16px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Submit / success ── */
    .submit-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }
    .btn-submit {
      padding: 10px 28px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9375rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-submit:hover:not(:disabled) { background: #4338ca; }
    .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

    .success-wrap {
      max-width: 480px;
      margin: 60px auto;
      text-align: center;
      padding: 40px 32px;
      background: #fff;
      border-radius: 16px;
      border: 1.5px solid #bbf7d0;
    }
    .success-wrap .success-icon { font-size: 3rem; margin-bottom: 16px; }
    .success-wrap h2 { font-size: 1.375rem; font-weight: 700; color: #111827; margin: 0 0 12px; }
    .success-wrap p  { color: #6b7280; line-height: 1.6; margin: 0; }

    /* ── Loading state ── */
    .loading-msg {
      text-align: center;
      color: #9ca3af;
      margin-top: 80px;
      font-size: .9375rem;
    }

    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  </style>
</head>
<body>
  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header id="shell-header">
    <div class="brand">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="2" y="2" width="16" height="16" rx="4" fill="#4f46e5"/>
        <path d="M6 10h8M10 6v8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Studio Shipgate
    </div>
    <span id="header-context" class="context"></span>
  </header>

  <!-- ── Scrollable card body ──────────────────────────────────── -->
  <main id="app">
    <p class="loading-msg">Loading review&hellip;</p>
  </main>

  <!-- ── Footer ───────────────────────────────────────────────── -->
  <footer id="shell-footer">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
    <div id="note-area">
      <p class="note-label" id="note-label">Add a note (required):</p>
      <textarea id="note-input" placeholder="Describe what you'd like changed or what you're asking…"></textarea>
      <button class="note-submit" id="note-submit">Submit verdict</button>
    </div>
    <div class="footer-inner" id="footer-actions">
      <button class="btn-back" id="btn-back" disabled>&#8592; Back</button>
      <span class="progress-label" id="progress-label"></span>
      <span class="spacer"></span>
      <button class="btn-approve" id="btn-approve">&#9989; Approve</button>
      <button class="btn-change" id="btn-change">&#9999;&#65039; Request a change</button>
      <button class="btn-question" id="btn-question">&#128172; Ask a question</button>
    </div>
  </footer>

  <!-- ── Diff drawer ───────────────────────────────────────────── -->
  <div id="drawer-backdrop" role="dialog" aria-modal="true" aria-label="Technical detail">
    <div id="drawer-panel">
      <div id="drawer-header">
        <h2>Technical detail</h2>
        <button id="drawer-close" aria-label="Close">&#10005;</button>
      </div>
      <div id="drawer-body">
        <pre id="drawer-pre">Loading&hellip;</pre>
      </div>
    </div>
  </div>

  <script src="/app/review.js"></script>
</body>
</html>
